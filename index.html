<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stampt — Loyalty Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDbxGEjC6Au06hI14yr0p152pzZ_Gu6DHI",
    authDomain: "loyalty-stamps-18.firebaseapp.com",
    projectId: "loyalty-stamps-18",
    storageBucket: "loyalty-stamps-18.firebasestorage.app",
    messagingSenderId: "491145109938",
    appId: "1:491145109938:web:86b65784b7382064e484ab",
    measurementId: "G-YTM4ZVW803"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);

  // Expose a window.storage-compatible API backed by Firestore,
  // so the rest of the app's logic doesn't need to change.
  window.storage = {
    async get(key, shared){
      try{
        const ref = doc(db, "stampt", key);
        const snap = await getDoc(ref);
        if(!snap.exists()) return null;
        return { key, value: snap.data().value, shared: !!shared };
      }catch(e){ console.error("storage.get error", e); return null; }
    },
    async set(key, value, shared){
      try{
        const ref = doc(db, "stampt", key);
        await setDoc(ref, { value });
        return { key, value, shared: !!shared };
      }catch(e){ console.error("storage.set error", e); return null; }
    },
    async delete(key, shared){
      try{
        const ref = doc(db, "stampt", key);
        await deleteDoc(ref);
        return { key, deleted: true, shared: !!shared };
      }catch(e){ console.error("storage.delete error", e); return null; }
    },
    async list(prefix, shared){
      try{
        const colSnap = await getDocs(collection(db, "stampt"));
        const keys = [];
        colSnap.forEach(d => {
          if(!prefix || d.id.startsWith(prefix)) keys.push(d.id);
        });
        return { keys, prefix, shared: !!shared };
      }catch(e){ console.error("storage.list error", e); return null; }
    }
  };

  // Signal that storage is ready, in case the app needs to wait for it.
  window.dispatchEvent(new Event('storage-ready'));
</script>
<style>
  :root{
    --kraft: #e8dcc8;
    --kraft-dark: #d9c9a8;
    --ink: #2b2118;
    --ink-soft: #5a4f42;

  }

  .card{

  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:14px 0 6px;letter-spacing:0.3px;}
  input{

    cursor:pointer;letter-spacing:0.3px;
  }
  button.primary:hover{background:#3d3024;}
  button.secondary{
    margin-top:10px;width:100%;background:none;

  /* punch card */

  .stamp-mark{

  .stamp-slot.free .stamp-mark{border-color:var(--gold);color:var(--gold);}
  .progress-note{font-size:12.5px;color:var(--ink-soft);margin-top:10px;text-align:center;}

  .seller-actions{display:flex;gap:10px;margin-top:18px;}
  .seller-actions button{flex:1;}
  button.danger{background:none;border:1.5px solid var(--stamp-red);color:var(--stamp-red);}

  .section-title{

  .cust-row:hover{border-color:var(--ink);}
  .cust-row-main{
    flex:1;display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;min-width:0;

  .cust-row .ci-name{font-weight:600;font-size:14.5px;}
  .cust-row .ci-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .cust-row .ci-stamps{

    flex-shrink:0;
  }

    flex-shrink:0;width:30px;height:30px;border-radius:50%;

    padding:0;
  }
  .remove-btn:hover{border-color:var(--stamp-red);color:var(--stamp-red);background:rgba(193,68,14,0.08);}
  .empty-state{
    text-align:center;padding:36px 20px;color:var(--ink-soft);font-size:13.5px;

    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--cream);padding:11px 20px;border-radius:24px;
    font-size:13.5px;font-weight:600;box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:opacity 0.25s, transform 0.25s;

<body>
<div class="wrap" id="app"><div class="loading">Loading your card…</div></div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_SHARED = true;
let state = {
  view: 'loading', // loading, role-select, seller-login, seller-setup, customer-login, seller-dashboard, customer-card, seller-view-customer
  loginRole: 'seller',
  session: null, // {role:'seller'} or {role:'customer', id}
  customers: [],
  error: '',
  modal: null,
};

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

async function safeGet(key, shared){
  try{
    const r = await window.storage.get(key, shared);
    return r ? r.value : null;
  }catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ return await window.storage.set(key, value, shared); }catch(e){ console.error(e); return null; }
}
async function safeList(prefix, shared){
  try{
    const r = await window.storage.list(prefix, shared);
    return r ? r.keys : [];
  }catch(e){ return []; }
}
async function safeDelete(key, shared){
  try{ return await window.storage.delete(key, shared); }catch(e){ return null; }
}

const STAMPS_NEEDED = 10;

function genId(){ return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

async function loadSellerAuth(){
  const v = await safeGet('seller-auth', true);
  return v ? JSON.parse(v) : null;
}

async function loadCustomerList(){
  const keys = await safeList('customer:', true);
  const list = [];
  for(const k of keys){
    const v = await safeGet(k, true);
    if(v) list.push(JSON.parse(v));
  }
  list.sort((a,b)=> b.createdAt - a.createdAt);
  return list;
}

async function init(){
  const sess = sessionStorage.getItem('stampt_session');
  if(sess){
    state.session = JSON.parse(sess);
    if(state.session.role === 'seller'){
      state.customers = await loadCustomerList();
      state.view = 'seller-dashboard';
    }else{
      state.view = 'customer-card';
    }
  }else{
    state.view = 'role-select';
  }
  render();
}

function setSession(s){
  state.session = s;
  if(s) sessionStorage.setItem('stampt_session', JSON.stringify(s));
  else sessionStorage.removeItem('stampt_session');
}

// ---------- ACTIONS ----------

async function doSellerLogin(username, password){
  const auth = await loadSellerAuth();
  if(!auth){ state.error = 'No seller account exists yet.'; render(); return; }
  if(auth.username.toLowerCase() === username.trim().toLowerCase() && auth.password === password){
    setSession({role:'seller'});
    state.customers = await loadCustomerList();
    state.error='';
    state.view = 'seller-dashboard';
    render();
  }else{
    state.error = 'Incorrect username or password.';
    render();
  }
}

async function doSellerSetup(username, password, confirm){
  if(!username.trim() || !password){ state.error='Fill in all fields.'; render(); return; }
  if(password !== confirm){ state.error='Passwords do not match.'; render(); return; }
  await safeSet('seller-auth', JSON.stringify({username:username.trim(), password}), true);
  setSession({role:'seller'});
  state.customers = [];
  state.error='';
  state.view='seller-dashboard';
  render();
  toast('Seller account created');
}

async function doCustomerLogin(phone, password){
  const list = await loadCustomerList();
  const found = list.find(c => c.phone.trim() === phone.trim() && c.password === password);
  if(!found){ state.error = 'Incorrect phone or password.'; render(); return; }
  setSession({role:'customer', id: found.id});
  state.error='';
  state.view = 'customer-card';
  render();
}

function doLogout(){
  setSession(null);
  state.view = 'role-select';
  state.error='';
  render();
}

async function addCustomer(name, phone, password){
  if(!name.trim() || !phone.trim() || !password){ state.error='Fill in all fields.'; render(); return; }
  const list = await loadCustomerList();
  if(list.some(c=>c.phone.trim()===phone.trim())){ state.error='A customer with this phone already exists.'; render(); return; }
  const customer = {
    id: genId(),
    name: name.trim(),
    phone: phone.trim(),
    password,
    code: genCode(),
    stamps: 0,
    rewardsEarned: 0,
    history: [{ts: Date.now(), text:'Card created'}],
    createdAt: Date.now(),
  };
  await safeSet('customer:'+customer.id, JSON.stringify(customer), true);
  state.customers = await loadCustomerList();
  state.modal = null;
  state.error='';
  render();
  toast(name.trim()+'\'s card created');
}

async function addStamp(customerId){
  const v = await safeGet('customer:'+customerId, true);
  if(!v) return;
  const c = JSON.parse(v);
  c.stamps += 1;
  let earnedReward = false;
  if(c.stamps >= STAMPS_NEEDED){
    c.stamps = 0;
    c.rewardsEarned += 1;
    earnedReward = true;
    c.history.unshift({ts: Date.now(), text:'🎉 Reward earned — free item unlocked'});
  }else{
    c.history.unshift({ts: Date.now(), text:'Stamp added ('+c.stamps+'/'+STAMPS_NEEDED+')'});
  }
  await safeSet('customer:'+customerId, JSON.stringify(c), true);
  state.customers = await loadCustomerList();
  render();
  toast(earnedReward ? '🎉 Reward unlocked for '+c.name+'!' : 'Stamp added');
}

async function redeemReward(customerId){
  const v = await safeGet('customer:'+customerId, true);
  if(!v) return;
  const c = JSON.parse(v);
  if(c.rewardsEarned <= 0) return;
  c.rewardsEarned -= 1;
  c.history.unshift({ts: Date.now(), text:'Reward redeemed'});
  await safeSet('customer:'+customerId, JSON.stringify(c), true);
  state.customers = await loadCustomerList();
  render();
  toast('Reward redeemed for '+c.name);
}

async function removeCustomer(customerId){
  await safeDelete('customer:'+customerId, true);
  state.customers = await loadCustomerList();
  state.modal = null;
  render();
  toast('Card removed');
}

// ---------- RENDER ----------

function el(html){
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

function brandHeader(showLogout){
  return `
    <div class="brand">
      <div class="brand-mark">
        <div class="brand-stamp">S</div>
        <div>
          <h1>Stampt</h1>
          <div class="tag">Loyalty Cards</div>
        </div>
      </div>
      ${showLogout ? `<button class="logout-btn" onclick="doLogout()">Log out</button>` : ''}
    </div>
  `;
}

function render(){
  const app = document.getElementById('app');
  let html = '';

  if(state.view === 'role-select'){
    html = `
      ${brandHeader(false)}
      <div class="card" style="text-align:center;padding:34px 24px;">
        <h2>A stamp for every visit.</h2>
        <p class="muted" style="margin-top:8px;">Buy ${STAMPS_NEEDED}, get one free. Log in below to see your card or manage your shop's customers.</p>
      </div>
      <div class="role-toggle">
        <button class="${state.loginRole==='customer'?'active':''}" onclick="state.loginRole='customer';render()">I'm a customer</button>
        <button class="${state.loginRole==='seller'?'active':''}" onclick="state.loginRole='seller';render()">I'm the seller</button>
      </div>
      <div id="login-slot"></div>
    `;
    app.innerHTML = html;
    renderLoginSlot();
    return;
  }

  if(state.view === 'seller-dashboard'){
    const c = state.customers;
    html = `
      ${brandHeader(true)}
      <div class="card">
        <h2>Your customers</h2>
        <p class="muted">${c.length} card${c.length===1?'':'s'} issued · ${STAMPS_NEEDED} stamps = 1 free item</p>
        <button class="primary" onclick="openAddCustomerModal()">+ Add new customer</button>
      </div>
      <div class="section-title"><h3>All cards</h3></div>
      ${c.length === 0 ? `<div class="empty-state">No customers yet. Add your first one above.</div>` :
        c.map(cust => `
          <div class="cust-row">
            <div class="cust-row-main" onclick="openCustomerDetail('${cust.id}')">
              <div>
                <div class="ci-name">${escapeHtml(cust.name)}</div>
                <div class="ci-meta">${escapeHtml(cust.phone)} ${cust.rewardsEarned > 0 ? '· 🎁 '+cust.rewardsEarned+' ready' : ''}</div>
              </div>
              <div class="ci-stamps">${cust.stamps}/${STAMPS_NEEDED}</div>
            </div>
            <button class="remove-btn" title="Remove customer" onclick="event.stopPropagation(); confirmRemoveCustomer('${cust.id}', '${escapeHtml(cust.name).replace(/'/g, "\\'")}')">✕</button>
          </div>
        `).join('')
      }
    `;
    app.innerHTML = html;
    if(state.modal === 'add-customer') renderAddCustomerModal();
    if(state.modal === 'customer-detail') renderCustomerDetailModal();
    if(state.confirmRemove) renderConfirmRemoveModal();
    return;
  }

  if(state.view === 'customer-card'){
    const cust = state.customers.find(x=>x.id===state.session.id);
    app.innerHTML = `<div class="loading">Loading your card…</div>`;
    renderCustomerCardAsync();
    return;
  }
}

async function renderCustomerCardAsync(){
  const v = await safeGet('customer:'+state.session.id, true);
  const app = document.getElementById('app');
  if(!v){ app.innerHTML = brandHeader(true) + `<div class="empty-state">We couldn't find your card. Ask the seller to check your account.</div>`; return; }
  const c = JSON.parse(v);
  app.innerHTML = `
    ${brandHeader(true)}
    ${stampCardHtml(c, false)}
    <div class="section-title"><h3>Recent activity</h3></div>
    <div class="card history-list">
      ${c.history.slice(0,8).map(h=>`<div class="hist-item">${escapeHtml(h.text)} · ${timeAgo(h.ts)}</div>`).join('') || '<div class="muted">No activity yet.</div>'}
    </div>
  `;
}

function stampCardHtml(c, sellerView){
  const slots = [];
  for(let i=0;i<STAMPS_NEEDED;i++){
    const filled = i < c.stamps;
    slots.push(`
      <div class="stamp-slot ${filled?'filled':''}">
        ${filled ? `<div class="stamp-mark">★</div>` : ''}
      </div>
    `);
  }
  return `
    <div class="punchcard">
      <div class="pc-top">
        <div>
          <div class="pc-name">${escapeHtml(c.name)}</div>
          <div class="pc-code">#${c.code}</div>
        </div>
        ${c.rewardsEarned > 0 ? `<div class="pc-rewards">🎁 ${c.rewardsEarned} reward${c.rewardsEarned>1?'s':''} ready</div>` : ''}
      </div>
      <div class="stamps-grid">${slots.join('')}</div>
      <div class="progress-note">${c.stamps} of ${STAMPS_NEEDED} stamps — ${STAMPS_NEEDED - c.stamps} more for a free item</div>
      ${sellerView ? `
        <div class="seller-actions">
          <button class="primary" onclick="addStamp('${c.id}')">+ Add stamp</button>
          <button class="gold" ${c.rewardsEarned<=0?'disabled':''} onclick="redeemReward('${c.id}')">Redeem reward</button>
        </div>
      ` : ''}
    </div>
  `;
}

function renderLoginSlot(){
  const slot = document.getElementById('login-slot');
  if(state.loginRole === 'customer'){
    slot.innerHTML = `
      <div class="card">
        <h2>Customer login</h2>
        <p class="muted">Use the phone number and password your seller set up for you.</p>
        <label>Phone number</label>
        <input id="cl-phone" type="tel" placeholder="e.g. 9876543210" autocomplete="off">
        <label>Password</label>
        <input id="cl-password" type="password" placeholder="Your password">
        ${state.error ? `<div class="err">${escapeHtml(state.error)}</div>` : ''}
        <button class="primary" onclick="submitCustomerLogin()">Log in</button>
      </div>
    `;
  }else{
    slot.innerHTML = `<div id="seller-login-card"></div>`;
    checkSellerAuthExists();
  }
}

async function checkSellerAuthExists(){
  const auth = await loadSellerAuth();
  const card = document.getElementById('seller-login-card');
  if(!card) return;
  if(!auth){
    card.innerHTML = `
      <div class="card">
        <h2>Set up your shop</h2>
        <p class="muted">No seller account exists yet. Create one to start issuing cards.</p>
        <label>Username</label>
        <input id="ss-username" type="text" placeholder="e.g. cornercafe" autocomplete="off">
        <label>Password</label>
        <input id="ss-password" type="password" placeholder="Choose a password">
        <label>Confirm password</label>
        <input id="ss-confirm" type="password" placeholder="Confirm password">
        ${state.error ? `<div class="err">${escapeHtml(state.error)}</div>` : ''}
        <button class="primary" onclick="submitSellerSetup()">Create seller account</button>
      </div>
    `;
  }else{
    card.innerHTML = `
      <div class="card">
        <h2>Seller login</h2>
        <p class="muted">Manage your customers' loyalty cards.</p>
        <label>Username</label>
        <input id="sl-username" type="text" placeholder="Username" autocomplete="off">
        <label>Password</label>
        <input id="sl-password" type="password" placeholder="Password">
        ${state.error ? `<div class="err">${escapeHtml(state.error)}</div>` : ''}
        <button class="primary" onclick="submitSellerLogin()">Log in</button>
      </div>
    `;
  }
}

function submitCustomerLogin(){
  const phone = document.getElementById('cl-phone').value;
  const password = document.getElementById('cl-password').value;
  doCustomerLogin(phone, password);
}
function submitSellerLogin(){
  const u = document.getElementById('sl-username').value;
  const p = document.getElementById('sl-password').value;
  doSellerLogin(u, p);
}
function submitSellerSetup(){
  const u = document.getElementById('ss-username').value;
  const p = document.getElementById('ss-password').value;
  const c = document.getElementById('ss-confirm').value;
  doSellerSetup(u, p, c);
}

function openAddCustomerModal(){ state.modal = 'add-customer'; state.error=''; render(); }
function closeModal(){ state.modal = null; render(); }

function renderAddCustomerModal(){
  const app = document.getElementById('app');
  app.appendChild(el(`
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h2>Add new customer</h2>
          <button class="close-x" onclick="closeModal()">&times;</button>
        </div>
        <p class="muted">Set up their card and login. Share the password with them directly.</p>
        <label>Customer name</label>
        <input id="ac-name" type="text" placeholder="Full name">
        <label>Phone number</label>
        <input id="ac-phone" type="tel" placeholder="Used to log in">
        <label>Password</label>
        <input id="ac-password" type="text" placeholder="Set a password for them">
        ${state.error ? `<div class="err">${escapeHtml(state.error)}</div>` : ''}
        <button class="primary" onclick="submitAddCustomer()">Create card</button>
        <button class="secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  `));
}

function submitAddCustomer(){
  const name = document.getElementById('ac-name').value;
  const phone = document.getElementById('ac-phone').value;
  const password = document.getElementById('ac-password').value;
  addCustomer(name, phone, password);
}

function openCustomerDetail(id){
  state.modal = 'customer-detail';
  state.modalCustomerId = id;
  render();
}

function renderCustomerDetailModal(){
  const c = state.customers.find(x=>x.id===state.modalCustomerId);
  if(!c) return;
  const app = document.getElementById('app');
  app.appendChild(el(`
    <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h2>${escapeHtml(c.name)}</h2>
          <button class="close-x" onclick="closeModal()">&times;</button>
        </div>
        <p class="muted">${escapeHtml(c.phone)} · Card #${c.code}</p>
        ${stampCardHtml(c, true)}
        <div class="section-title"><h3>Activity</h3></div>
        <div class="history-list">
          ${c.history.slice(0,10).map(h=>`<div class="hist-item">${escapeHtml(h.text)} · ${timeAgo(h.ts)}</div>`).join('')}
        </div>
        <button class="danger" style="margin-top:16px;" onclick="confirmRemoveCustomer('${c.id}', '${escapeHtml(c.name).replace(/'/g, "\\'")}')">Remove card</button>
      </div>
    </div>
  `));
}

function confirmRemoveCustomer(id, name){
  state.confirmRemove = {id, name};
  render();
}

function renderConfirmRemoveModal(){
  const info = state.confirmRemove;
  if(!info) return;
  const app = document.getElementById('app');
  app.appendChild(el(`
    <div class="modal-overlay" onclick="if(event.target===this){ state.confirmRemove=null; render(); }">
      <div class="modal" style="max-width:380px;">
        <div class="modal-head">
          <h2>Remove card?</h2>
          <button class="close-x" onclick="state.confirmRemove=null; render()">&times;</button>
        </div>
        <p class="muted">This will permanently delete ${escapeHtml(info.name)}'s loyalty card and stamp history. This cannot be undone.</p>
        <button class="danger" style="margin-top:16px;" onclick="removeCustomer('${info.id}'); state.confirmRemove=null;">Yes, remove card</button>
        <button class="secondary" onclick="state.confirmRemove=null; render()">Cancel</button>
      </div>
    </div>
  `));
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}
function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// re-render seller modal after stamp/redeem actions while modal open
const origRender = render;
render = function(){
  origRender();
  if(state.view==='seller-dashboard' && state.modal==='customer-detail'){
    // already handled in render()
  }
};

if(window.storage){
  init();
}else{
  window.addEventListener('storage-ready', init, {once:true});
}
</script>
</body>
</html>
